name: PO1 DOP - CI Pipeline

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Этап 1: проверка на утечку секретов (до сборки)
  detect-secrets:
    name: Поиск секретов
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/path" -w /path \
            zricethezav/gitleaks:latest detect --source /path --config /path/.gitleaks.toml --verbose --exit-code 1

  # Этап 2: сборка (только если секретов нет)
  build:
    name: Сборка
    runs-on: ubuntu-latest
    needs: [detect-secrets]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build with Maven
        run: mvn clean package -B
